# Add these directives inside your existing VirtualHost for secorp.net
# Requires: mod_proxy, mod_proxy_http, mod_proxy_wstunnel

# Enable required modules (if not already):
# a2enmod proxy proxy_http proxy_wstunnel

# WebSocket terminal streams — MUST come before the /termag ProxyPass
ProxyPass        /termag/ws  ws://localhost:3040/termag/ws
ProxyPassReverse /termag/ws  ws://localhost:3040/termag/ws

# HTTP API + static frontend
ProxyPass        /termag  http://localhost:3040/termag
ProxyPassReverse /termag  http://localhost:3040/termag

# Optional: block external access to the status hook endpoint
# (hooks are called by local Claude Code processes only)
# <Location /termag/api/status>
#   Require ip 127.0.0.1
# </Location>
